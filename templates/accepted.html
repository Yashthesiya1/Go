<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabz - Request Accepted</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@250;300;400;500;600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

  <header class="header">
    <img src="/static/images/logo.svg" alt="Tabz" class="header__logo">
    <a href="#" class="header__link">
      <span class="header__link-desktop">Download App</span>
      <span class="header__link-mobile">Open App</span>
    </a>
  </header>

  <main class="card-container">
    <div class="result-card">
      <div class="result-status">
        <img src="/static/icons/check-circle.svg" alt="Accepted" class="status-icon">
        <span class="status-text status-text--accepted">Request Accepted</span>
      </div>

      <div class="discover-card">
        <img src="/static/images/DISCOVER.png" alt="" class="discover-card__bg">
        <div class="discover-card__content">
          <div class="discover-card__info">
            <img src="/static/icons/tabz-icon-small.svg" alt="" class="discover-card__icon">
            <h2 class="discover-card__title">Discover Tabz</h2>
            <p class="discover-card__text">Do you exchange money with your friends and keep tabs?<br><br>We make it easy to keep track of it all in one place.</p>
          </div>
          <a href="#" class="discover-card__btn">Go To App Store</a>
        </div>
      </div>
    </div>
  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
